<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 48" fill="none">
  <!-- NFL Shield - official brand colors -->
  <!-- Outer shield shape -->
  <path d="M20 0C8.95 0 0 4.5 0 10v14c0 13.25 8.5 20.5 20 24 11.5-3.5 20-10.75 20-24V10c0-5.5-8.95-10-20-10z" fill="#003369"/>
  <!-- Inner border -->
  <path d="M20 2.5c-9.4 0-17.5 3.8-17.5 8.5v13c0 11.6 7.5 18 17.5 21.2 10-3.2 17.5-9.6 17.5-21.2V11c0-4.7-8.1-8.5-17.5-8.5z" fill="#003369" stroke="#fff" stroke-width="1.2"/>
  <!-- Red center band -->
  <path d="M4 18h32v8H4z" fill="#D50A0A"/>
  <!-- Stars on blue - top row -->
  <circle cx="11" cy="11" r="1.5" fill="#fff"/>
  <circle cx="16" cy="9.5" r="1.5" fill="#fff"/>
  <circle cx="20" cy="8.5" r="1.5" fill="#fff"/>
  <circle cx="24" cy="9.5" r="1.5" fill="#fff"/>
  <circle cx="29" cy="11" r="1.5" fill="#fff"/>
  <!-- Stars - second row -->
  <circle cx="13" cy="14.5" r="1.2" fill="#fff"/>
  <circle cx="18" cy="13" r="1.2" fill="#fff"/>
  <circle cx="22" cy="13" r="1.2" fill="#fff"/>
  <circle cx="27" cy="14.5" r="1.2" fill="#fff"/>
  <!-- Football in center -->
  <ellipse cx="20" cy="22" rx="6" ry="3.5" fill="#824A29" stroke="#fff" stroke-width="0.6"/>
  <line x1="20" y1="18.5" x2="20" y2="25.5" stroke="#fff" stroke-width="0.5"/>
  <line x1="17" y1="22" x2="23" y2="22" stroke="#fff" stroke-width="0.5"/>
  <line x1="17.5" y1="20.8" x2="22.5" y2="20.8" stroke="#fff" stroke-width="0.3"/>
  <line x1="17.5" y1="23.2" x2="22.5" y2="23.2" stroke="#fff" stroke-width="0.3"/>
  <!-- NFL Text -->
  <text x="20" y="34" text-anchor="middle" fill="#D50A0A" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="7" letter-spacing="1.5">NFL</text>
  <!-- Bottom stars -->
  <circle cx="14" cy="38" r="1.2" fill="#fff"/>
  <circle cx="20" cy="39" r="1.2" fill="#fff"/>
  <circle cx="26" cy="38" r="1.2" fill="#fff"/>
</svg>
